       <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thinki AI 🧠</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 🚨 Bulletproof Global Overrides to force Dark Mode Theme */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: #111827 !important;
            color: #ffffff !important;
            font-family: Arial, sans-serif !important;
        }

        /* Main Full-Screen Layout Splitter */
        .app-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* 🧭 Sliding Sidebar Styling Panel */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: #1f2937 !important;
            border-right: 1px solid #374151 !important;
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            box-sizing: border-box;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        /* Collapsed Sidebar Hidden State */
        .sidebar.collapsed {
            transform: translateX(-260px);
            margin-right: -260px;
        }

        /* 💬 Main Central Workspace Container Area */
        .main-chat-window {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            background-color: #111827 !important;
        }

        /* Live Scrolling History Feed Window wrapper */
        .sidebar-list-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* 🍔 Sticky Floating Menu Toggle Trigger Button */
        .menu-toggle-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #3b82f6 !important;
            color: white !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 8px 14px !important;
            font-size: 18px !important;
            cursor: pointer;
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* 🧠 Header brand design holding title text and logo side by side */
        .brand-header {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 12px !important;
            margin-top: 15px !important;
            margin-bottom: 5px !important;
            width: 100% !important;
        }

        .brand-header h1 {
            color: #ffffff !important;
            margin: 0 !important;
            font-size: 32px !important;
            font-family: Arial, sans-serif !important;
            display: inline-block !important;
        }

        .brand-logo-emoji {
            font-size: 32px !important;
        }

        /* Central Layout Content Wrapper Override */
        .thinki-main-container {
            width: 100% !important;
            max-width: 600px !important;
            margin: 0 auto !important;
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
            text-align: center !important;
        }

        /* 💬 Dynamic Live Text Dialogue Box styling */
        #chat-container {
            min-height: 280px !important;
            max-height: 480px !important;
            overflow-y: auto !important;
            text-align: left !important;
            margin-bottom: 15px !important;
            padding: 15px !important;
            border-radius: 8px !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }

        /* Responsive Breakpoints handling viewports */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
            }
            .sidebar.collapsed {
                transform: translateX(-260px);
                margin-right: 0;
            }
            .main-chat-window {
                width: 100%;
                padding-top: 70px;
            }
        }
    </style>
</head>
<body>

    <div class="app-layout">
        
        <button class="menu-toggle-btn" onclick="toggleSidebarMenu()">☰</button>
        
        <div id="thinki-sidebar" class="sidebar">
            <button onclick="createNewChatSession()" style="width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; transition: background 0.2s;">
                + New Chat
            </button>
            
            <div id="history-sidebar-list" class="sidebar-list-container">
                </div>
        </div>

        <div class="main-chat-window">
            
            <div class="thinki-main-container">
                
                <div id="auth-section" style="text-align: right; margin-bottom: 10px; min-height: 35px;">
                    <button id="login-btn" onclick="handleLogin()" style="padding: 6px 12px; border-radius: 15px; border: none; background: #3b82f6; color: white; cursor: pointer; font-weight: bold;">Sign In</button>
                    <span id="user-welcome" style="display: none; color: #fff; font-weight: bold; margin-right: 8px;"></span>
                    <button id="logout-btn" onclick="handleLogout()" style="display: none; padding: 4px 8px; border-radius: 12px; border: 1px solid #ef4444; background: transparent; color: #ef4444; cursor: pointer;">Sign Out</button>
                </div>

                <div class="brand-header">
                    <span class="brand-logo-emoji">🧠</span>
                    <h1>Thinki AI</h1>
                </div>
                
                <p style="color: #9ca3af !important; text-align: center; margin-top: 5px; margin-bottom: 20px;">Smart little genius with a big brain – created by Kandi Chantilly 🧠</p>
                
                <div id="chat-container"></div>

                <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                    <textarea id="userInput" placeholder="Talk to Thinki here..." style="width: 100%; height: 85px; padding: 10px; border-radius: 8px; border: 1px solid #374151; background: #1f2937; color: white; font-family: Arial, sans-serif; resize: none; box-sizing: border-box;"></textarea>
                    
                    <div class="buttons" style="display: flex; gap: 8px; margin-top: 10px; width: 100%; justify-content: center; flex-wrap: wrap;">
                        <button onclick="sendMessage()" style="background: #10b981; color: white; font-weight: bold; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;">Send</button>
                        <button onclick="startVoiceInput()" style="background: #4b5563; color: white; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer;">🎙️ Mic</button>
                        <button onclick="downloadChatHistory()" style="background: #4b5563; color: white; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer;">📥 Download</button>
                        
                        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)" />
                        <button onclick="document.getElementById('fileInput').click()" style="background: #4b5563; color: white; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer;">📎 File</button>
                    </div>
                </div>
            </div>

            <p style="text-align: center; color: #9ca3af !important; font-size: 12px; margin-top: 30px; width: 100%; max-width: 600px;">
                Friendly disclaimer: Thinki AI can make mistakes — always verify important info.
            </p>
            
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
